name: 🐛 Bug 报告
description: 提交一个 Bug 报告帮助我们改进
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提交 Bug 报告！请尽可能详细地描述问题。
        
        🌹 智亦师亦友亦伯乐；谱一言一语一华章

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug 描述
      description: 清晰简洁地描述 Bug 是什么
      placeholder: 例如：当我点击"发送私信"按钮时，消息列表没有更新
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 🔍 复现步骤
      description: 详细步骤让我们能复现问题
      placeholder: |
        1. 进入 '/ai-family-messages' 路由
        2. 选择 'NAVIGATOR' 家人
        3. 输入消息并点击发送
        4. 观察...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 期望行为
      description: 您期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 🚨 严重程度
      options:
        - 🟢 低 — 不影响使用
        - 🟡 中 — 影响部分功能
        - 🟠 高 — 影响核心功能
        - 🔴 紧急 — 系统崩溃/数据丢失
    validations:
      required: true

  - type: input
    id: family-member
    attributes:
      label: 🤖 涉及的家人（如适用）
      placeholder: "例如：NAVIGATOR / THINKER / META_ORACLE"

  - type: textarea
    id: environment
    attributes:
      label: 🖥️ 环境信息
      description: 操作系统、浏览器、Node/Bun 版本等
      placeholder: |
        - OS: macOS 15 / Windows 11 / Ubuntu 24.04
        - Browser: Chrome 131 / Safari 18
        - Node: 20.x / Bun: 1.3.11
        - YYC³ Version: 
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📋 错误日志 / 截图
      description: 请粘贴相关日志或截图（拖拽到此处即可）

  - type: checkboxes
    id: terms
    attributes:
      label: 📜 行为准则
      options:
        - label: 我已搜索现有 Issues，确认这不是重复问题
          required: true
        - label: 我已阅读项目文档与 README
          required: true
